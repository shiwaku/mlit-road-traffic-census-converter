name: Deploy viewer to GitHub Pages

# viewer/ のビルド成果物（viewer/dist）を GitHub Pages に公開する。
# PMTiles 等の巨大データはビルドに含めず、外部ホストの URL を参照する（src/config/years.ts の PROD_URL）。

on:
  push:
    branches: [main]
    paths:
      - 'viewer/**'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: viewer
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: viewer/package-lock.json
      - run: npm ci
      - run: npm run build
        env:
          # Pages のサブパス（/<repo>/）を Vite の base に注入
          VITE_BASE: /${{ github.event.repository.name }}/
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: viewer/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
