year: r03
label: 令和3年度
output_basename: traffic_census_2021

# --- ダウンロード（方式A: 可視化ツールのGeoJSON直DL） ---
geojson_url_base: https://www.mlit.go.jp/road/ir/ir-data/census_visualizationR3
kasho_csv_url_template: https://www.mlit.go.jp/road/census/r3/data/csv/kasyo{ken}.csv
# 時間帯別交通量表（拡張・任意）。DESIGN.md §8 参照。空/未設定ならDLしない。
jikantai_csv_url_template: https://www.mlit.go.jp/road/census/r3/data/csv/zkntrf{ken}.csv
road_types: [drm10, drm20, drm31, drm32, drm40_50, drm60_70]
tileindex: configs/tileindex/tileindex_zoomlevel_12.csv   # 列順 x,y,z（ヘッダなし）
ken_code_list: configs/tileindex/KenCodeList.csv          # 1列目=都道府県コード（ヘッダあり）
request_timeout: [3.0, 5.0]
request_sleep: 0.1

# --- 箇所別基本表CSVの結合 ---
key_column: 交通調査基本区間番号
key_zfill: 0                       # R03は元CSVが11桁で揃うため0埋め不要
csv_encodings: [utf-8, shift-jis, cp932]

# --- コード→ラベル変換・型キャスト ---
mappings: configs/mappings/r03_mappings.yaml
schema_csv: configs/schema/r03_schema.csv    # Name,TypeName（Integer/Real/String）

# --- GeoJSONへの紐づけ ---
geojson_key_property: census       # GeoJSON側の区間番号プロパティ

# --- 出力 ---
crs: null                          # nullで元CRS維持（R03元データは EPSG:4612）
