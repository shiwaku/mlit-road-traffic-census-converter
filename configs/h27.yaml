year: h27
label: 平成27年度
output_basename: traffic_census_2015

# --- ダウンロード（方式A: 可視化ツールのGeoJSON直DL） ---
# 注: H27 可視化ツールのエンドポイントは census_visualization2
geojson_url_base: https://www.mlit.go.jp/road/ir/ir-data/census_visualization2
kasho_csv_url_template: https://www.mlit.go.jp/road/census/h27/data/csv/kasyo{ken}.csv
road_types: [drm10, drm20, drm31, drm32, drm40_50, drm60_70]
tileindex: configs/tileindex/tileindex_zoomlevel_12.csv
ken_code_list: configs/tileindex/KenCodeList.csv
request_timeout: [3.0, 5.0]
request_sleep: 0.1

# --- 箇所別基本表CSVの結合 ---
key_column: 交通調査基本区間番号
key_zfill: 11                      # H27は元CSVで先頭ゼロが落ちるため11桁に0埋め
csv_encodings: [utf-8, shift-jis, cp932]

# --- コード→ラベル変換・型キャスト ---
mappings: configs/mappings/h27_mappings.yaml
schema_csv: configs/schema/h27_schema.csv

# --- GeoJSONへの紐づけ ---
geojson_key_property: census

# --- 出力 ---
crs: null                          # H27元データは crs メンバーなし（=CRS84/WGS84相当）
